<rect x="317.68396355136855" y="0" width="35.0266809439626" height="8" fill="#3178c6"/>
<rect x="352.71064449533117" y="0" width="24.0418886370917" height="8" fill="#3572A5"/>
<rect x="376.75253313242285" y="0" width="14.473900430691836" height="8" fill="#f34b7d"/>
<rect x="391.2264335631147" y="0" width="10.669811824448583" height="8" fill="#663399"/>
<rect x="401.8962453875633" y="0" width="6.289272451146732" height="8" fill="#e34c26"/>
<rect x="408.18551783871004" y="0" width="0.7667768114566401" height="8" fill="#DA3434"/>
<rect x="408.95229465016666" y="0" width="0.49253704780323426" height="8" fill="#384d54"/>

            </g>
        </g>

        
        <g transform="translate(30, 220)">
