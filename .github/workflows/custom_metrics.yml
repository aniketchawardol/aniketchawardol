name: Generate Custom Metrics

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight UTC
  workflow_dispatch:    # Allows manual triggering
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install requests

      - name: Generate Custom Stats Card
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: python generate_card.py

      - name: Commit and Push Image
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_metrics.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "Update custom metrics card"
          git push
