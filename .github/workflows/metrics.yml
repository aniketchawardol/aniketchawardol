name: Metrics
on:
  # Schedule daily updates (runs at 00:00 UTC / 5:30 AM IST)
  schedule: [{cron: "0 0 * * *"}]
  # Allow manual trigger
  workflow_dispatch:
  # Run on push to main/master
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          
          # General settings
          user: aniketchawardol
          template: classic
          config_timezone: Asia/Kolkata
          
          # Base content (Header, Activity, Community, Repositories)
          # Including 'community' and 'activity' helps show engagement
          base: header, activity, community, repositories
          
          # ISO Calendar (Half-year view)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Languages settings
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
          plugin_languages_details: lines, percentage
          
          # Follow-up plugin: Tracks PRs/Issues you've commented on or opened
          # This is the primary way to display "Participation" beyond formal reviews
          plugin_followup: yes
          plugin_followup_sections: user
          
          # Notable contributions: Displays your involvement in different projects
          plugin_notable: yes
          plugin_notable_from: all
          plugin_notable_types: commit, pull_request, issue

          # Lines of code plugin (Optional, but looks great with PR stats)
          plugin_lines: yes
